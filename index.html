<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos Thatá - TCDF</title>
    <style>
        :root { 
            --bg: #faf9fc; --card: #fff; --text: #2d2a3a; --text-sec: #5a5568; 
            --lilac: #8b78b0; --lilac-light: #ede7f6; --border: #d4c4e8; --hover: #f5f2fa; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Fonte base ligeiramente maior (14px) e linha mais confortável */
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.3; padding: 12px; font-size: 14px; }
        
        /* Header compacto, mas com fontes melhores */
        header { max-width: 1200px; margin: 0 auto 10px; display: flex; align-items: baseline; justify-content: center; gap: 12px; }
        h1 { font-size: 1.25rem; font-weight: 700; color: var(--lilac); }
        .sub { color: var(--text-sec); font-size: 0.8rem; }

        .search { max-width: 1200px; margin: 0 auto 12px; }
        .search input { width: 100%; padding: 8px 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--card); font-size: 0.9rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .search input:focus { border-color: var(--lilac); box-shadow: 0 0 0 3px var(--lilac-light); }
        
        /* Grid equilibrado: largura mínima de 225px para melhor leitura */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(225px, 1fr)); 
            gap: 10px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        /* Cards com padding um pouco maior para "respirar" */
        .card { background: var(--card); border-radius: 8px; padding: 12px; border: 1px solid var(--border); transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139, 120, 176, 0.1); }
        .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; border-bottom: 1px solid var(--lilac-light); padding-bottom: 6px; }
        
        /* Ícones e títulos maiores */
        .icon { font-size: 1rem; background: var(--lilac-light); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; flex-shrink: 0; }
        .title { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }

        .topics { list-style: none; display: flex; flex-direction: column; gap: 2px; }
        .topics a { 
            color: var(--lilac); text-decoration: none; font-size: 0.8rem; font-weight: 500; 
            padding: 4px 8px; border-radius: 5px; display: block; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background 0.15s;
        }
        .topics a:hover { background: var(--hover); color: var(--text); }

        .single { display: inline-block; margin-top: auto; padding: 6px 14px; background: var(--lilac); color: white; border-radius: 6px; text-decoration: none; font-size: 0.8rem; font-weight: 600; text-align: center; transition: opacity 0.15s; }
        .single:hover { opacity: 0.9; }

        .empty { text-align: center; color: var(--text-sec); padding: 20px; grid-column: 1 / -1; font-size: 0.9rem; }
        
        footer { text-align: center; margin-top: 16px; color: var(--text-sec); font-size: 0.75rem; opacity: 0.8; padding-bottom: 8px; }
        
        /* Responsividade para celular: 2 colunas */
        @media(max-width:500px){ .grid{grid-template-columns: 1fr 1fr; gap: 6px;} body { padding: 6px; } header { flex-direction: column; align-items: center; gap: 2px; text-align: center;} }
    </style>
</head>
<body>
    <header>
        <h1>Estudos da Thatá - TCDF</h1>
        <p class="sub">Materiais por disciplina</p>
    </header>
    <div class="search">
        <input type="text" id="search" placeholder="🔍 Filtrar disciplina ou tópico...">
    </div>
    <div class="grid" id="grid"></div>
    <footer>💡 GitHub Pages & Local. Atualizado para 2026.</footer>

    <script>
        // Restaurei os nomes completos dos tópicos para melhor leitura, 
        // já que agora temos mais espaço nos cards.
        const subjects = [
            { name: "Língua Portuguesa", icon: "📖", topics: [
                { t: "1 e 2: Interpretação, Gêneros e Tipos", f: "portugues-01.html" },
                { t: "3 e 4: Ortografia e Coesão Textual", f: "portugues-02.html" },
                { t: "5.1-5.4: Morfossintaxe e Pontuação", f: "portugues-03.html" },
                { t: "5.5-5.8: Concordância, Regência e Crase", f: "portugues-04.html" },
                { t: "6: Reescrita e Significação de Palavras", f: "portugues-05.html" },
                { t: "7: Manual de Redação Oficial TCDF", f: "portugues-06.html" },
            ]},
            { name: "Lei Orgânica do DF", icon: "🏛️", file: "lodf.html" },
            { name: "Regime Jurídico (LC 840/11)", icon: "⚖️", topics: [ 
                { t: "1.1 Carreiras, Regime e Jornada", f: "lc840-01.html" },
                { t: "1.2 Direitos do Servidor", f: "lc840-02.html" },
                { t: "1.3 Deveres e Proibições", f: "lc840-03.html" },
                { t: "1.4 Regime Disciplinar", f: "lc840-04.html" }
            ]},
            { name: "Conhecimentos do DF", icon: "📍", file: "df-conhecimentos.html" },
            { name: "Estatística", icon: "📊", file: "estatistica.html" },
            { name: "Raciocínio Lógico", icon: "🧠", file: "raciocinio-logico.html" },
            { name: "Controle da Adm. Pública", icon: "🔍", topics: [  
                { t: "Teoria Geral do Controle", f: "controle-01.html" },
                { t: "LIA (Lei 8.429/1992 atualizada)", f: "controle-02.html" },
                { t: "Lei Orgânica do TCDF", f: "controle-03.html" },
                { t: "Controle Interno vs Externo", f: "controle-04.html" },
            ]},
            { name: "Direito Previdenciário", icon: "🏥", topics: [  
                { t: "Teoria Geral", f: "previdenciario-01.html" },
                { t: "RPPS/DF", f: "previdenciario-02.html" },
            ] },
            { name: "Matemática Financeira", icon: "💰", file: "mat-financeira.html" },
            { name: "Análise de Dados", icon: "📈", file: "analise-dados.html" },
            { name: "Direito Constitucional", icon: "🇧🇷", topics: [
                { t: "1. Princípios Fundamentais", f: "constitucional-01.html" },
                { t: "2. Aplicabilidade das Normas", f: "constitucional-02.html" },
                { t: "3. Direitos e Garantias Fundamentais", f: "constitucional-03.html" },
                { t: "4. Organização Político-Administrativa", f: "constitucional-04.html" },
                { t: "5. Administração Pública na CF", f: "constitucional-05.html" },
                { t: "6. Poder Executivo", f: "constitucional-06.html" },
                { t: "7. Poder Legislativo", f: "constitucional-07.html" },
                { t: "8. LGPD (Lei 13.709/2018)", f: "constitucional-08.html" }
            ]},
            { name: "Direito Administrativo", icon: "📋", topics: [
                { t: "1. Estado, Governo e Administração", f: "administrativo-01.html" },
                { t: "3. Atos Administrativos", f: "administrativo-03.html" },
                { t: "4. Agentes Públicos", f: "administrativo-04.html" },
                { t: "5. Poderes da Administração", f: "administrativo-05.html" },
                { t: "7. Responsabilidade Civil do Estado", f: "administrativo-07.html" },
                { t: "11. Processo Adm. (Lei 9.784/99)", f: "administrativo-11.html" },
                { t: "12. Licitações e Contratos (Lei 14.133)", f: "administrativo-12.html" },
            ]},
            { name: "Adm. Financeira Orçamentária", icon: "💵", topics: [
                { t: "1. Orçamento Público e Princípios", f: "afo-01.html" },
                { t: "4. Receita e Despesa Pública", f: "afo-04.html" },
                { t: "6. LRF (LC 101/2000)", f: "afo-06.html" },
                { t: "9. Decreto Distrital 32.598/10", f: "afo-09.html" }
            ]},
            { name: "Administração Geral", icon: "🏢", topics: [
                { t: "Evolução da administração e teorias", f: "adm-geral-01.html" },
                { t: "Funções de administração (PODC)", f: "adm-geral-02.html" },
                { t: "Gestão de pessoas e comportamento", f: "adm-geral-03.html" },
                { t: "Gestão da qualidade e modelos", f: "adm-geral-04.html" },
                { t: "Gestão de projetos e processos", f: "adm-geral-05.html" }
            ]},
            { name: "Gestão de Contratos", icon: "📝", topics: [
                { t: "1. Legislação Aplicável", f: "gestao-contratos-01.html" },
                { t: "2. Fiscalização e Execução", f: "gestao-contratos-02.html" }
            ]}
        ];

        const grid = document.getElementById('grid');
        const render = q => {
            grid.innerHTML = '';
            const lq = q.toLowerCase();
            subjects.forEach(s => {
                // Filtro inteligente: busca no nome da disciplina OU nos tópicos
                const filteredTopics = s.topics ? s.topics.filter(t => t.t.toLowerCase().includes(lq)) : [];
                if(lq && !s.name.toLowerCase().includes(lq) && filteredTopics.length === 0) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                
                // Cabeçalho do Card (com linha divisória sutil)
                let html = `<div class="card-head">
                                <div class="icon">${s.icon}</div>
                                <div class="title" title="${s.name}">${s.name}</div>
                            </div>`;
                
                // Corpo do Card
                if(s.topics) {
                    html += '<ul class="topics">';
                    // Mostra todos os tópicos se não houver busca, ou apenas os filtrados
                    const itemsToDisplay = lq ? filteredTopics : s.topics;
                    itemsToDisplay.forEach(t => {
                        html += `<li><a href="${t.f}" title="${t.t}">${t.t}</a></li>`;
                    });
                    html += '</ul>';
                } else {
                    // Botão para disciplinas sem subtópicos (alinha ao fundo do card)
                    html += `<a href="${s.file}" class="single">Acessar Material</a>`;
                }
                
                card.innerHTML = html;
                grid.appendChild(card);
            });
            
            // Mensagem de "não encontrado"
            if(!grid.children.length) grid.innerHTML = '<div class="empty">⚠️ Nenhum material ou tópico encontrado para esta busca.</div>';
        };

        // Evento de busca
        document.getElementById('search').addEventListener('input', e => render(e.target.value));
        
        // Renderização inicial
        render('');
    </script>
</body>
</html>
